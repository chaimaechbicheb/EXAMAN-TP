<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une question</title>
</head>
<body>

    <h1>Ajouter une question à un examen</h1>

    <form id="form-question">

        <!-- Champ : nom du propriétaire -->
        <input type="text" id="proprietaire" placeholder="Nom du propriétaire"></br></br>

        <!-- Champ : nom de l'examen -->
        <input type="text" id="nomExamen" placeholder="Nom de l'examen"></br></br>

        <!-- Énoncé de la question -->
        <input id="enonce" placeholder="Énoncé"></br></br>

        <!-- Durée -->
        <input type="number" id="duree" placeholder="Durée en secondes"></br></br>

        <!-- Points -->
        <input type="number" id="points" placeholder="Points"></br></br>

        <!-- Conteneur propositions -->
        <div id="propositions"></div>

        <!-- Bouton ajouter proposition -->
        <button type="button" id="add-proposition">
            Ajouter une proposition
        </button>

        <button type="submit">
            Ajouter la question
        </button>

    </form>

    <script src="ajouter-question.js"></script>

</body>
</html>
