<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Ajouter un Examen</title>
</head>
<body >
    
    <h1>Créer un nouvel examen</h1> 
 
   <form id="examen-form">
   <div class="mb-3">
     <label>Nom de l'examen</label>
     <input type="text" id="nom" class="" required>
   </div>
   <div class="mb-3">
     <label>Durée (minutes)</label>
     <input type="number" id="duree" class="form-control" required>
   </div>
   <div class="mb-3">
     <label>Description</label>
     <textarea id="description" class="form-control" required></textarea>
   </div>
   <div class="mb-3">
     <label>Nom du propriétaire</label>
     <input type="text" id="proprietaire" class="form-control" required>
   </div>
   <button type="submit" class="btn btn-primary">Ajouter l'examen</button>
   </form>
   <script src="script.js"></script>
</body>
</html>
