<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un Examen</title>
</head>
<body>

    <h1>Créer un nouvel examen</h1>

    <form id="form-examen">

        <!-- Champ : nom de l'examen -->
        <input type="text" id="nom" placeholder="Nom de l'examen" required></br></br>

        <!-- Champ : durée en minutes -->
        <input type="number" id="duree" placeholder="Durée en minutes" required></br></br>

        <!-- Zone de texte : description -->
        <input id="description" placeholder="Description"></br></br>

        <!-- Champ : nom du propriétaire -->
        <input type="text" id="proprietaire" placeholder="Nom du propriétaire" required></br></br>

        <button type="submit">Ajouter l'examen</button>

    </form>

    <!-- Lier le fichier JavaScript -->
    <script src="script.js"></script>

</body>
</html>
